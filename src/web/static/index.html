<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Console</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <span class="agent-name" id="agentName">Agent</span>
            <span class="status-dot" id="statusDot"></span>
            <span class="status-text" id="statusText">connecting</span>
            <span class="header-spacer"></span>
            <span class="stat-item">&#128172; <span id="statCalls">0</span></span>
            <span class="stat-item">&#165; <span id="statCost">0</span></span>
            <span class="stat-item">Model: <span id="infoModel">-</span></span>
            <span class="stat-item">Tools: <span id="infoTools">0</span></span>
        </header>

        <main class="main">
            <!-- Resizable sidebar -->
            <aside class="panel-sidebar" id="sidebar">
                <!-- Avatar -->
                <div class="avatar-section">
                    <div class="avatar-ring" id="avatarRing">
                        <div class="avatar-face-icon">&#129302;</div>
                    </div>
                    <div class="avatar-label" id="avatarLabel">idle</div>
                </div>

                <!-- Info -->
                <div class="info-section">
                    <div class="info-row"><span>Tasks</span><span id="infoTasks">0</span></div>
                </div>

                <!-- Panel tasks -->
                <div class="sidebar-label">PANEL TASKS</div>
                <div class="tasks-list" id="tasksList">
                    <div class="empty-state">Loading...</div>
                </div>

                <!-- Todos -->
                <div class="sidebar-label">TODOS</div>
                <div class="tasks-list" id="todoList">
                    <div class="empty-state">Loading...</div>
                </div>
            </aside>

            <!-- Resize handle -->
            <div class="resize-handle" id="resizeHandle"></div>

            <!-- Center: Document / Chat -->
            <section class="panel-main">
                <div class="main-toolbar">
                    <div class="main-tabs">
                        <span class="main-tab active" data-tab="chat">Chat</span>
                        <span class="main-tab" data-tab="sessions">Sessions</span>
                        <span class="main-tab" data-tab="workspace">Workspace</span>
                        <span class="main-tab" data-tab="logs">Logs</span>
                    </div>
                    <span class="main-path" id="mainPath"></span>
                </div>

                <!-- Workspace -->
                <div class="main-body" id="workspaceBody" style="display:none">
                    <div class="workspace-grid" id="workspaceGrid">
                        <div class="ws-card">
                            <div class="ws-card-title">Agent Status</div>
                            <div class="ws-card-body" id="wsStatus"></div>
                        </div>
                        <div class="ws-card">
                            <div class="ws-card-title">Recent Memory</div>
                            <div class="ws-card-body" id="wsMemory"></div>
                        </div>
                        <div class="ws-card">
                            <div class="ws-card-title">Panel Tasks</div>
                            <div class="ws-card-body" id="wsPanel"></div>
                        </div>
                        <div class="ws-card">
                            <div class="ws-card-title">Sub-agents</div>
                            <div class="ws-card-body" id="wsSubagents"></div>
                        </div>
                    </div>
                </div>

                <!-- Chat -->
                <div class="main-body" id="chatBody">
                    <div class="chat-messages" id="chatMessages">
                        <div class="welcome-text">Ask the agent...</div>
                    </div>
                    <div class="chat-input-area">
                        <button class="btn-new-chat" id="newChatBtn" title="New Session">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        </button>
                        <textarea id="chatInput" placeholder="Type a message..." rows="1"></textarea>
                        <button class="btn-send" id="sendBtn">
                            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Sessions -->
                <div class="main-body" id="sessionsBody" style="display:none">
                    <div class="sessions-layout">
                        <div class="sessions-sidebar">
                            <div class="sessions-sidebar-header">
                                <span>Sessions</span>
                                <span class="sessions-count" id="sessionsTotalCount">0</span>
                            </div>
                            <div class="sessions-session-list" id="sessionsSessionList">
                                <div class="empty-state">Loading...</div>
                            </div>
                        </div>
                        <div class="sessions-detail">
                            <div class="sessions-messages" id="sessionsMessages" style="display:none">
                                <div class="sessions-messages-header" id="sessionMessagesHeader"></div>
                                <div class="sessions-messages-list" id="sessionMessagesList"></div>
                            </div>
                            <div class="sessions-empty" id="sessionsEmpty">
                                <div class="empty-state">Select a session to view messages</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Logs -->
                <div class="main-body" id="logsBody" style="display:none">
                    <pre class="log-content" id="logContent">Loading logs...</pre>
                </div>
            </section>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
